<body>
<div id="root"></div>

<script type="text/plain" id="app-src">
const { useState, useEffect, useRef, useCallback } = React;

const PICK_COUNT = 4;

const MSGS = [
  "リストを保存しています...",
  "感性の近いユーザーを探しています...",
  "おすすめ映画を算出しています...",
  "もうすぐ完成します..."
];

function getSessionId() {
  let id = localStorage.getItem("m9-session");
  if (!id) {
    id = Date.now().toString(36) + Math.random().toString(36).slice(2, 10);
    localStorage.setItem("m9-session", id);
  }
  return id;
}

async function searchMovies(q) {
  const r = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
  const d = await r.json();
  if (!r.ok) {
    console.error("検索API応答エラー:", r.status, d);
    return [];
  }
  return Array.isArray(d) ? d : [];
}

async function submitPicks(sessionId, picks) {
  const r = await fetch("/api/submit", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ sessionId, picks })
  });
  if (!r.ok) throw new Error("送信に失敗しました");
  return r.json();
}

// ── シェア画像（4枚のポスターを2x2に並べたPNG画像）を作る ──

// TMDBの画像をそのままcanvasに読み込むとCORSでブロックされるため、
// 自分のサーバー（/api/img）を経由させてから読み込む
function proxify(url) {
  return url ? `/api/img?url=${encodeURIComponent(url)}` : url;
}

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

function drawCover(ctx, img, x, y, w, h) {
  const ir = img.width / img.height;
  const tr = w / h;
  let sx, sy, sw, sh;
  if (ir > tr) { sh = img.height; sw = sh * tr; sx = (img.width - sw) / 2; sy = 0; }
  else { sw = img.width; sh = sw / tr; sx = 0; sy = (img.height - sh) / 2; }
  ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
}

function wrapLines(ctx, text, maxWidth, maxLines) {
  const out = [];
  let line = "";
  for (const ch of text) {
    const test = line + ch;
    if (ctx.measureText(test).width > maxWidth && line) { out.push(line); line = ch; }
    else line = test;
    if (out.length >= maxLines) break;
  }
  if (line && out.length < maxLines) out.push(line);
  return out.slice(0, maxLines);
}

async function buildShareImage(picks) {
  const TILE = 380, GAP = 6, TOP = 110;
  const W = TILE * 2 + GAP;
  const H = TOP + TILE * 2 + GAP;
  const canvas = document.createElement("canvas");
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext("2d");

  ctx.fillStyle = "#080808";
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = "#d4a843";
  ctx.font = "bold 36px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText(`私の好きな映画${PICK_COUNT}選`, W / 2, 68);

  const positions = [[0, TOP], [TILE + GAP, TOP], [0, TOP + TILE + GAP], [TILE + GAP, TOP + TILE + GAP]];

  for (let i = 0; i < picks.length && i < 4; i++) {
    const m = picks[i];
    const [x, y] = positions[i];
    try {
      if (m.poster) {
        const img = await loadImage(proxify(m.poster));
        drawCover(ctx, img, x, y, TILE, TILE);
      } else {
        ctx.fillStyle = "#141414"; ctx.fillRect(x, y, TILE, TILE);
      }
    } catch (e) {
      console.error("ポスター読み込み失敗:", m.title, e);
      ctx.fillStyle = "#141414"; ctx.fillRect(x, y, TILE, TILE);
    }
    const grad = ctx.createLinearGradient(x, y + TILE - 110, x, y + TILE);
    grad.addColorStop(0, "rgba(0,0,0,0)");
    grad.addColorStop(1, "rgba(0,0,0,.88)");
    ctx.fillStyle = grad;
    ctx.fillRect(x, y + TILE - 110, TILE, 110);

    ctx.fillStyle = "#fff";
    ctx.font = "bold 22px sans-serif";
    ctx.textAlign = "left";
    const lines = wrapLines(ctx, m.title, TILE - 32, 2);
    lines.forEach((l, li) => ctx.fillText(l, x + 16, y + TILE - 58 + li * 28));
  }

  return new Promise(resolve => canvas.toBlob(resolve, "image/png"));
}

function App() {
  const [sid] = useState(getSessionId);
  const [picks, setPicks] = useState([]);
  const [q, setQ] = useState("");
  const [drops, setDrops] = useState([]);
  const [searching, setSearching] = useState(false);
  const [showDrop, setShowDrop] = useState(false);
  const [phase, setPhase] = useState("select");
  const [ldgMsg, setLdgMsg] = useState(0);
  const [recs, setRecs] = useState([]);
  const [simCnt, setSimCnt] = useState(0);
  const [error, setError] = useState("");
  const [selectedRec, setSelectedRec] = useState(null);
  const [sharing, setSharing] = useState(false);
  const [toast, setToast] = useState("");
  const debRef = useRef(null);
  const inpRef = useRef(null);
  const wrapRef = useRef(null);
  const toastRef = useRef(null);

  const ready = picks.length === PICK_COUNT;
  const remaining = PICK_COUNT - picks.length;

  useEffect(() => {
    if (!q.trim() || q.trim().length < 2) { setDrops([]); setShowDrop(false); return; }
    setSearching(true); setShowDrop(true);
    clearTimeout(debRef.current);
    debRef.current = setTimeout(async () => {
      try {
        const r = await searchMovies(q);
        setDrops(r.filter(x => x && x.id && x.title));
      } catch (e) {
        console.error("検索エラー:", e);
        setDrops([]);
      } finally {
        setSearching(false);
      }
    }, 400);
    return () => clearTimeout(debRef.current);
  }, [q]);

  useEffect(() => {
    const fn = e => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setShowDrop(false); };
    document.addEventListener("mousedown", fn);
    return () => document.removeEventListener("mousedown", fn);
  }, []);

  useEffect(() => {
    if (phase !== "loading") return;
    const t = setInterval(() => setLdgMsg(i => (i + 1) % 4), 1400);
    return () => clearInterval(t);
  }, [phase]);

  const showToast = msg => {
    setToast(msg);
    clearTimeout(toastRef.current);
    toastRef.current = setTimeout(() => setToast(""), 5000);
  };

  const addMovie = useCallback(m => {
    if (picks.length >= PICK_COUNT || picks.some(p => p.id === m.id)) return;
    setPicks(prev => [...prev, m]);
    setQ(""); setDrops([]); setShowDrop(false);
  }, [picks]);

  const delMovie = id => setPicks(prev => prev.filter(p => p.id !== id));

  const handleSubmit = async () => {
    if (!ready) return;
    setError(""); setPhase("loading"); setLdgMsg(0);
    try {
      const data = await submitPicks(sid, picks);
      setRecs(data.recs || []);
      setSimCnt(data.similarUsers || 0);
      setPhase("results");
    } catch (e) {
      setError("通信に失敗しました。もう一度お試しください。");
      setPhase("select");
    }
  };

  const handleShare = async () => {
    setSharing(true);
    const shareText = `私の好きな映画${PICK_COUNT}選\n${location.origin}`;
    let blob = null;
    try {
      blob = await buildShareImage(picks);
    } catch (e) {
      console.error("画像生成エラー:", e);
    }

    if (blob && window.navigator && navigator.canShare && navigator.share) {
      try {
        const file = new File([blob], "my-movies.png", { type: "image/png" });
        if (navigator.canShare({ files: [file] })) {
          await navigator.share({ files: [file], text: shareText });
          setSharing(false);
          return;
        }
      } catch (e) {
        // ユーザーがキャンセルした場合などはフォールバックへ
      }
    }

    if (blob) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = "my-movies.png";
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 4000);
      showToast("画像をダウンロードしました。Xの投稿画面に手動で添付してください📎");
    }
    window.open(`https://x.com/intent/tweet?text=${encodeURIComponent(shareText)}`, "_blank");
    setSharing(false);
  };

  const handleReset = () => {
    setPicks([]); setRecs([]); setPhase("select");
    setSimCnt(0); setQ(""); setSelectedRec(null);
  };

  return (
    <div className="app">
      {phase === "select" && (
        <React.Fragment>
          <header className="hero">
            <p className="hero-ey">Movie Recommendation</p>
            <h1 className="hero-h1">もっと広めたい<br/>映画{PICK_COUNT}選</h1>
            <p className="hero-sub">もっと多くの人に観てほしい映画を{PICK_COUNT}本えらんで。<br/>感性の近い人がおすすめする作品に出会えるかも。</p>
          </header>

          <div className="prog">
            <div className="prog-dots">
              {Array.from({length: PICK_COUNT}).map((_,i) => <div key={i} className={"pd" + (i < picks.length ? " on" : "")} />)}
            </div>
            <span className="prog-lbl">{ready ? `${PICK_COUNT}本そろいました ✓` : `あと${remaining}本`}</span>
          </div>

          <div className="srch" ref={wrapRef}>
            <span className="srch-ic">🔍</span>
            <input
              ref={inpRef}
              className="srch-in"
              type="text"
              placeholder={ready ? `${PICK_COUNT}本選択済み` : "映画タイトルを検索..."}
              value={q}
              disabled={ready}
              onChange={e => setQ(e.target.value)}
              onFocus={() => q.trim().length >= 2 && setShowDrop(true)}
            />
            {showDrop && q.trim().length >= 2 && (
              <div className="drop">
                {searching ? <div className="drop-st">検索中...</div> :
                 drops.length === 0 ? <div className="drop-st">見つかりませんでした</div> :
                 drops.map(m => {
                   const already = picks.some(p => p.id === m.id);
                   return (
                     <div key={m.id} className="di" onClick={() => !already && addMovie(m)}>
                       {m.poster ? <img className="di-poster" src={m.poster} alt="" /> : <div className="di-poster" />}
                       <div className="di-nfo">
                         <div className="di-ttl">{m.title}</div>
                         <div className="di-meta">{m.year} ・ {m.genre} ・ {m.director}</div>
                       </div>
                       {already ? <span style={{fontSize:11,color:"#444"}}>選択済</span> :
                         <button className="di-add" onClick={e => {e.stopPropagation(); addMovie(m);}}>追加</button>}
                     </div>
                   );
                 })}
              </div>
            )}
          </div>

          <div className="strip-wrap">
            <div className="perf" />
            <div className="grid">
              {Array.from({length: PICK_COUNT}).map((_,i) => {
                const m = picks[i];
                return m ? (
                  <div key={m.id} className="sl sl-filled">
                    {m.poster && <img className="sl-poster" src={m.poster} alt="" />}
                    <div className="sl-in">
                      <div className="sl-genre">{m.genre}</div>
                      <div className="sl-ttl">{m.title}</div>
                      <div className="sl-yr">{m.year}</div>
                      <div className="sl-dir">{m.director}</div>
                      <button className="sl-del" onClick={() => delMovie(m.id)}>×</button>
                    </div>
                  </div>
                ) : (
                  <div key={i} className="sl sl-empty" onClick={() => !ready && inpRef.current && inpRef.current.focus()}>
                    <span className="sl-n">0{i+1}</span>
                    <span className="sl-plus">+</span>
                  </div>
                );
              })}
            </div>
            <div className="perf" />
          </div>

          <div className="cta">
            <button className={"cta-btn " + (ready ? "rdy" : "nrdy")} onClick={handleSubmit} disabled={!ready}>
              {ready ? "おすすめを見つける →" : `あと${remaining}本えらんでください`}
            </button>
            {ready && <p className="cta-hint">リストを保存し、感性の近い人のおすすめを表示します</p>}
            {error && <div className="err-box">{error}</div>}
          </div>
        </React.Fragment>
      )}

      {phase === "loading" && (
        <div className="load-scr">
          <div className="load-ic">🎬</div>
          <div className="load-msg">{MSGS[ldgMsg]}</div>
          <div className="load-sub">あなたのリストを分析しています</div>
        </div>
      )}

      {phase === "results" && (
        <React.Fragment>
          <div className="res-hero">
            <p className="res-ey">あなたへのおすすめ</p>
            <h2 className="res-h2">{simCnt >= 3 ? `${simCnt}人の感性が生んだ${PICK_COUNT}本` : `あなたの趣味から見つけた${PICK_COUNT}本`}</h2>
            <div className="res-badge">{simCnt >= 3 ? `👥 ${simCnt}人の近い趣向のユーザーによる推薦` : "🎞️ まだユーザーが少ないため類似作品から推薦"}</div>
          </div>

          <div className="rec-grid">
            {recs.map((m, i) => (
              <div key={m.id || i} className="rc" onClick={() => setSelectedRec(m)}>
                {m.poster && <img className="rc-poster" src={m.poster} alt="" />}
                <div className="rc-in">
                  <div className="rc-num">REC {String(i+1).padStart(2,"0")}</div>
                  <div className="rc-genre">{m.genre}</div>
                  <div className="rc-ttl">{m.title}</div>
                  <div className="rc-yr">{m.year}</div>
                  <div className="rc-dir">{m.director}</div>
                  {m.reason && <div className="rc-rsn">{m.reason}</div>}
                </div>
                <div className="rc-tap">タップで詳細</div>
              </div>
            ))}
          </div>

          <div className="mypicks">
            <div className="mypicks-lbl">あなたが選んだ{PICK_COUNT}本</div>
            <div className="chips">{picks.map(p => <span key={p.id} className="chip">{p.title}</span>)}</div>
          </div>

          <div className="acts">
            <button className="act-btn share" onClick={handleShare} disabled={sharing}>
              {sharing ? "画像を作成中..." : "𝕏 でシェア"}
            </button>
            <button className="act-btn reset" onClick={handleReset}>やり直す</button>
          </div>
        </React.Fragment>
      )}

      <div className="foot">Powered by TMDB</div>

      {selectedRec && (
        <div className="ov" onClick={() => setSelectedRec(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <button className="modal-close" onClick={() => setSelectedRec(null)}>×</button>
            {selectedRec.poster
              ? <img className="modal-poster" src={selectedRec.poster} alt="" />
              : <div className="modal-poster" />}
            <div className="modal-body">
              <div className="modal-genre">{selectedRec.genre}</div>
              <div className="modal-ttl">{selectedRec.title}</div>
              <div className="modal-meta">{selectedRec.year}{selectedRec.director ? ` ・ ${selectedRec.director}` : ""}</div>
              {selectedRec.reason && <div className="modal-rsn">{selectedRec.reason}</div>}
              <div className="modal-links">
                <a
                  className="modal-link eiga"
                  href={`https://eiga.com/search/${encodeURIComponent(selectedRec.title)}/`}
                  target="_blank" rel="noopener noreferrer"
                >🎬 映画.comで詳細を見る</a>
                <a
                  className={"modal-link watch" + (selectedRec.watchUrl ? "" : " disabled")}
                  href={selectedRec.watchUrl || "#"}
                  target="_blank" rel="noopener noreferrer"
                >📺 {selectedRec.watchUrl ? "配信状況を見る" : "配信情報が見つかりません"}</a>
              </div>
              {selectedRec.watchUrl && <div className="modal-jw">配信情報: JustWatch</div>}
            </div>
          </div>
        </div>
      )}

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<!-- 上の <script type="text/plain"> は「ただの文章」としてブラウザに無視されている。
     ここで自分の手で安全に変換して実行する（古いJSXの書き方=classicを明示することで
     新しいBabelが勝手にimport文を混ぜてくるのを防ぐ） -->
<script>
  (function () {
    var src = document.getElementById("app-src").textContent;
    var out = Babel.transform(src, {
      presets: [["react", { runtime: "classic" }]]
    }).code;
    var s = document.createElement("script");
    s.textContent = out;
    document.body.appendChild(s);
  })();
</script>

<!-- 保険：上のスクリプトが何らかの理由で動かなかったとき、
     真っ暗な画面のままにせず、エラーであることが分かるようにする -->
<script>
  setTimeout(function () {
    var root = document.getElementById("root");
    if (root && root.children.length === 0) {
      root.innerHTML =
        '<div style="padding:80px 24px;text-align:center;color:#999;font-family:sans-serif;line-height:1.8;max-width:480px;margin:0 auto;">' +
        '<p style="font-size:18px;color:#d4a843;margin-bottom:14px;">読み込みに失敗しました</p>' +
        '<p style="font-size:13px;">通信環境が不安定か、サイトの一部ファイルが正しく読み込めていない可能性があります。<br><br>' +
        "ページを再読み込みしても直らない場合は、サイト管理者にこの画面のスクリーンショットを送ってください。</p>" +
        "</div>";
    }
  }, 6000);
</script>
</body>
</html>
