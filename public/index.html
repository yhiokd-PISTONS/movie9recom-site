<body>
<div id="root"></div>

<script type="text/plain" id="app-src">
const { useState, useEffect, useRef, useCallback } = React;

const PICK_COUNT = 4;

const MSGS = [
  "リストを保存しています...",
  "感性の近いユーザーを探しています...",
  "おすすめ映画を算出しています...",
  "もうすぐ完成します..."
];

function getSessionId() {
  let id = localStorage.getItem("m9-session");
  if (!id) {
    id = Date.now().toString(36) + Math.random().toString(36).slice(2, 10);
    localStorage.setItem("m9-session", id);
  }
  return id;
}

async function searchMovies(q) {
  const r = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
  const d = await r.json();
  if (!r.ok) {
    console.error("検索API応答エラー:", r.status, d);
    return [];
  }
  return Array.isArray(d) ? d : [];
}

async function submitPicks(sessionId, picks) {
  const r = await fetch("/api/submit", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ sessionId, picks })
  });
  if (!r.ok) throw new Error("送信に失敗しました");
  return r.json();
}

// ── シェア画像（4枚のポスターを2x2に並べたPNG画像）を作る ──

// TMDBの画像をそのままcanvasに読み込むとCORSでブロックされるため、
// 自分のサーバー（/api/img）を経由させてから読み込む
function proxify(url) {
  return url ? `/api/img?url=${encodeURIComponent(url)}` : url;
}

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

function drawCover(ctx, img, x, y, w, h) {
  const ir = img.width / img.height;
  const tr = w / h;
  let sx, sy, sw, sh;
  if (ir > tr) { sh = img.height; sw = sh * tr; sx = (img.width - sw) / 2; sy = 0; }
  else { sw = img.width; sh = sw / tr; sx = 0; sy = (img.height - sh) / 2; }
  ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
}

function wrapLines(ctx, text, maxWidth, maxLines) {
  const out = [];
  let line = "";
  for (const ch of text) {
    const test = line + ch;
    if (ctx.measureText(test).width > maxWidth && line) { out.push(line); line = ch; }
    else line = test;
    if (out.length >= maxLines) break;
  }
  if (line && out.length < maxLines) out.push(line);
  return out.slice(0, maxLines);
}

// ── デザインパーツ：祖父江慎的な「コラージュ感・手仕事感」を意識した装飾 ──
// （角丸の四角、ドット柄の背景、貼り合わせたようなテープのアクセント、
//   少し傾いた配置とはんこ風のタイトルで「紙モノ感」を出している）

function roundRectPath(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawDotPattern(ctx, w, h) {
  ctx.save();
  ctx.fillStyle = "rgba(212,168,67,.07)";
  const gap = 24;
  for (let y = 12; y < h; y += gap) {
    for (let x = 12; x < w; x += gap) {
      ctx.beginPath();
      ctx.arc(x, y, 1.3, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.restore();
}

function drawStampTitle(ctx, text, W, topY) {
  // 本体タイトル：ほんの少し傾けて版画・はんこのような手仕事感を出す
  ctx.save();
  ctx.translate(W / 2 - 16, topY);
  ctx.rotate((-1.4 * Math.PI) / 180);
  ctx.fillStyle = "#f3ead8";
  ctx.font = "bold 34px serif";
  ctx.textAlign = "center";
  ctx.fillText(text, 0, 0);
  ctx.restore();

  // 右肩に重なる丸スタンプ（「4」を選んだことを表す）
  ctx.save();
  ctx.translate(W - 58, topY - 28);
  ctx.rotate((13 * Math.PI) / 180);
  ctx.beginPath();
  ctx.arc(0, 0, 22, 0, Math.PI * 2);
  ctx.strokeStyle = "#c84830";
  ctx.lineWidth = 2.5;
  ctx.stroke();
  ctx.fillStyle = "#c84830";
  ctx.font = "bold 18px serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("4", 0, 1);
  ctx.restore();

  // 下に細いゴシックの添え書き
  ctx.fillStyle = "rgba(212,168,67,.75)";
  ctx.font = "11px sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "alphabetic";
  ctx.fillText("— A MOVIE COLLAGE —", W / 2, topY + 26);
}

async function buildShareImage(movies, headerText) {
  const TILE = 332, GAP = 24, SIDE = 32, TOP = 150;
  const W = SIDE * 2 + TILE * 2 + GAP;
  const H = TOP + TILE * 2 + GAP + 56;
  const canvas = document.createElement("canvas");
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext("2d");

  // 背景：温かみのあるダークトーン＋ドット柄
  ctx.fillStyle = "#0c0a08";
  ctx.fillRect(0, 0, W, H);
  drawDotPattern(ctx, W, H);

  drawStampTitle(ctx, headerText, W, 70);

  const positions = [
    [SIDE, TOP],
    [SIDE + TILE + GAP, TOP],
    [SIDE, TOP + TILE + GAP],
    [SIDE + TILE + GAP, TOP + TILE + GAP]
  ];
  const angles = [-3.2, 2.6, -2.2, 3.6]; // 度。1枚ずつ向きを変えて貼り合わせた感じに
  const tapeColors = ["rgba(196,72,48,.82)", "rgba(212,168,67,.82)"];

  for (let i = 0; i < movies.length && i < 4; i++) {
    const m = movies[i];
    const [bx, by] = positions[i];
    const cx = bx + TILE / 2;
    const cy = by + TILE / 2;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate((angles[i] * Math.PI) / 180);

    // ポラロイド風の白フチ＋影
    ctx.save();
    ctx.shadowColor = "rgba(0,0,0,.55)";
    ctx.shadowBlur = 20;
    ctx.shadowOffsetY = 10;
    ctx.fillStyle = "#f7f3ea";
    roundRectPath(ctx, -TILE / 2 - 9, -TILE / 2 - 9, TILE + 18, TILE + 58, 4);
    ctx.fill();
    ctx.restore();

    // ポスター画像（角を少し丸めてクリップ）
    try {
      if (m.poster) {
        const img = await loadImage(proxify(m.poster));
        ctx.save();
        roundRectPath(ctx, -TILE / 2, -TILE / 2, TILE, TILE, 2);
        ctx.clip();
        drawCover(ctx, img, -TILE / 2, -TILE / 2, TILE, TILE);
        ctx.restore();
      } else {
        ctx.fillStyle = "#1c1a16";
        ctx.fillRect(-TILE / 2, -TILE / 2, TILE, TILE);
      }
    } catch (e) {
      console.error("ポスター読み込み失敗:", m.title, e);
      ctx.fillStyle = "#1c1a16";
      ctx.fillRect(-TILE / 2, -TILE / 2, TILE, TILE);
    }

    // マスキングテープ風のアクセント（左上にぺたっと貼った風）
    ctx.save();
    ctx.translate(-TILE / 2 + 14, -TILE / 2 - 2);
    ctx.rotate((-20 * Math.PI) / 180);
    ctx.fillStyle = tapeColors[i % 2];
    ctx.fillRect(-30, -10, 60, 19);
    ctx.restore();

    // 通し番号（丸囲み）
    ctx.beginPath();
    ctx.arc(TILE / 2 - 16, -TILE / 2 + 16, 13, 0, Math.PI * 2);
    ctx.fillStyle = "#0c0a08";
    ctx.fill();
    ctx.fillStyle = "#f3ead8";
    ctx.font = "bold 13px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(String(i + 1).padStart(2, "0"), TILE / 2 - 16, TILE / -2 + 17);
    ctx.textBaseline = "alphabetic";

    // タイトル（白フチ部分に手書きラベル風に）
    ctx.fillStyle = "#1a1410";
    ctx.font = "bold 17px sans-serif";
    ctx.textAlign = "left";
    const lines = wrapLines(ctx, m.title, TILE - 6, 2);
    lines.forEach((l, li) => ctx.fillText(l, -TILE / 2 + 2, TILE / 2 + 22 + li * 20));

    ctx.restore();
  }

  // フッター
  ctx.fillStyle = "rgba(212,168,67,.55)";
  ctx.font = "11px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText(`もっと広めたい映画${PICK_COUNT}選`, W / 2, H - 18);

  return new Promise(resolve => canvas.toBlob(resolve, "image/png"));
}

// 画像を作って、そのままダウンロードさせる（シェアはせず保存のみ）
async function downloadShareImage(movies, headerText, filename) {
  const blob = await buildShareImage(movies, headerText);
  if (!blob) throw new Error("画像の生成に失敗しました");
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 4000);
}

// ────────────────────────────────────────────────────────────────
// 【将来アフィリエイトに切り替えるときは、ここだけ編集すればOK】
//
// 「配信状況を見る」ボタンの飛び先を決める関数。
// 今は TMDB から取れる JustWatch のリンク(movie.watchUrl)にそのまま飛ばしている。
// movie.providers には「Netflix」「U-NEXT」のような配信サービス名の配列が
// 入っているので、A8.netなどで提携が決まったサービスがあれば、
// 下のAFFILIATE_LINKSにURLを追記するだけで、自動的にそちらへ案内されるようになる。
//
// 例（提携が決まったらコメントを外して使う）:
// const AFFILIATE_LINKS = {
//   "U-NEXT":  "https://px.a8.net/svt/ejp?a8mat=XXXXXXX",
//   "Netflix": "https://px.a8.net/svt/ejp?a8mat=YYYYYYY",
//   "Hulu":    "https://px.a8.net/svt/ejp?a8mat=ZZZZZZZ",
// };
const AFFILIATE_LINKS = {};

function buildWatchLink(movie) {
  const providers = movie.providers || [];
  for (const name of providers) {
    if (AFFILIATE_LINKS[name]) return AFFILIATE_LINKS[name];
  }
  // 提携リンクが無ければ、これまで通りJustWatchの配信状況ページへ
  return movie.watchUrl || null;
}
// ────────────────────────────────────────────────────────────────


function App() {
  const [sid] = useState(getSessionId);
  const [picks, setPicks] = useState([]);
  const [q, setQ] = useState("");
  const [drops, setDrops] = useState([]);
  const [searching, setSearching] = useState(false);
  const [showDrop, setShowDrop] = useState(false);
  const [phase, setPhase] = useState("select");
  const [ldgMsg, setLdgMsg] = useState(0);
  const [recs, setRecs] = useState([]);
  const [simCnt, setSimCnt] = useState(0);
  const [directorMatch, setDirectorMatch] = useState(null);
  const [error, setError] = useState("");
  const [selectedRec, setSelectedRec] = useState(null);
  const [savingPicks, setSavingPicks] = useState(false);
  const [savingRecs, setSavingRecs] = useState(false);
  const [toast, setToast] = useState("");
  const debRef = useRef(null);
  const inpRef = useRef(null);
  const wrapRef = useRef(null);
  const toastRef = useRef(null);

  const ready = picks.length === PICK_COUNT;
  const remaining = PICK_COUNT - picks.length;

  useEffect(() => {
    if (!q.trim() || q.trim().length < 2) { setDrops([]); setShowDrop(false); return; }
    setSearching(true); setShowDrop(true);
    clearTimeout(debRef.current);
    debRef.current = setTimeout(async () => {
      try {
        const r = await searchMovies(q);
        setDrops(r.filter(x => x && x.id && x.title));
      } catch (e) {
        console.error("検索エラー:", e);
        setDrops([]);
      } finally {
        setSearching(false);
      }
    }, 400);
    return () => clearTimeout(debRef.current);
  }, [q]);

  useEffect(() => {
    const fn = e => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setShowDrop(false); };
    document.addEventListener("mousedown", fn);
    return () => document.removeEventListener("mousedown", fn);
  }, []);

  useEffect(() => {
    if (phase !== "loading") return;
    const t = setInterval(() => setLdgMsg(i => (i + 1) % 4), 1400);
    return () => clearInterval(t);
  }, [phase]);

  const showToast = msg => {
    setToast(msg);
    clearTimeout(toastRef.current);
    toastRef.current = setTimeout(() => setToast(""), 5000);
  };

  const addMovie = useCallback(m => {
    if (picks.length >= PICK_COUNT || picks.some(p => p.id === m.id)) return;
    setPicks(prev => [...prev, m]);
    setQ(""); setDrops([]); setShowDrop(false);
  }, [picks]);

  const delMovie = id => setPicks(prev => prev.filter(p => p.id !== id));

  const handleSubmit = async () => {
    if (!ready) return;
    setError(""); setPhase("loading"); setLdgMsg(0);
    try {
      const data = await submitPicks(sid, picks);
      setRecs(data.recs || []);
      setSimCnt(data.similarUsers || 0);
      setDirectorMatch(data.directorMatch || null);
      setPhase("results");
    } catch (e) {
      setError("通信に失敗しました。もう一度お試しください。");
      setPhase("select");
    }
  };

  const handleShare = () => {
    const list = picks.map(p => `・${p.title}`).join("\n");
    const text = `私が選んだ${PICK_COUNT}本はコチラ\n\n${list}\n\n#もっと広めたい映画${PICK_COUNT}選\n${location.origin}`;
    window.open(`https://x.com/intent/tweet?text=${encodeURIComponent(text)}`, "_blank");
  };

  const handleSavePicks = async () => {
    setSavingPicks(true);
    try {
      await downloadShareImage(picks, "MY CHOICE MOVIE", "my-choice-movie.png");
    } catch (e) {
      console.error("画像保存エラー:", e);
      showToast("画像の生成に失敗しました。もう一度お試しください。");
    }
    setSavingPicks(false);
  };

  const handleSaveRecs = async () => {
    setSavingRecs(true);
    try {
      await downloadShareImage(recs, "A RECOMMEND MOVIE", "recommend-movie.png");
    } catch (e) {
      console.error("画像保存エラー:", e);
      showToast("画像の生成に失敗しました。もう一度お試しください。");
    }
    setSavingRecs(false);
  };

  const handleReset = () => {
    setPicks([]); setRecs([]); setPhase("select");
    setSimCnt(0); setQ(""); setSelectedRec(null); setDirectorMatch(null);
  };

  return (
    <div className="app">
      {phase === "select" && (
        <React.Fragment>
          <header className="hero">
            <p className="hero-ey">Movie Recommendation</p>
            <h1 className="hero-h1">もっと広めたい<br/>映画{PICK_COUNT}選</h1>
            <p className="hero-sub">もっと多くの人に観てほしい映画を{PICK_COUNT}本えらんで。<br/>感性の近い人がおすすめする作品に出会えるかも。</p>
          </header>

          <div className="prog">
            <div className="prog-dots">
              {Array.from({length: PICK_COUNT}).map((_,i) => <div key={i} className={"pd" + (i < picks.length ? " on" : "")} />)}
            </div>
            <span className="prog-lbl">{ready ? `${PICK_COUNT}本そろいました ✓` : `あと${remaining}本`}</span>
          </div>

          <div className="srch" ref={wrapRef}>
            <span className="srch-ic">🔍</span>
            <input
              ref={inpRef}
              className="srch-in"
              type="text"
              placeholder={ready ? `${PICK_COUNT}本選択済み` : "映画タイトルを検索..."}
              value={q}
              disabled={ready}
              onChange={e => setQ(e.target.value)}
              onFocus={() => q.trim().length >= 2 && setShowDrop(true)}
            />
            {showDrop && q.trim().length >= 2 && (
              <div className="drop">
                {searching ? <div className="drop-st">検索中...</div> :
                 drops.length === 0 ? <div className="drop-st">見つかりませんでした</div> :
                 drops.map(m => {
                   const already = picks.some(p => p.id === m.id);
                   return (
                     <div key={m.id} className="di" onClick={() => !already && addMovie(m)}>
                       {m.poster ? <img className="di-poster" src={m.poster} alt="" /> : <div className="di-poster" />}
                       <div className="di-nfo">
                         <div className="di-ttl">{m.title}</div>
                         <div className="di-meta">{m.year} ・ {m.genre} ・ {m.director}</div>
                       </div>
                       {already ? <span style={{fontSize:11,color:"#444"}}>選択済</span> :
                         <button className="di-add" onClick={e => {e.stopPropagation(); addMovie(m);}}>追加</button>}
                     </div>
                   );
                 })}
              </div>
            )}
          </div>

          <div className="strip-wrap">
            <div className="perf" />
            <div className="grid">
              {Array.from({length: PICK_COUNT}).map((_,i) => {
                const m = picks[i];
                return m ? (
                  <div key={m.id} className="sl sl-filled">
                    {m.poster && <img className="sl-poster" src={m.poster} alt="" />}
                    <div className="sl-in">
                      <div className="sl-genre">{m.genre}</div>
                      <div className="sl-ttl">{m.title}</div>
                      <div className="sl-yr">{m.year}</div>
                      <div className="sl-dir">{m.director}</div>
                      <button className="sl-del" onClick={() => delMovie(m.id)}>×</button>
                    </div>
                  </div>
                ) : (
                  <div key={i} className="sl sl-empty" onClick={() => !ready && inpRef.current && inpRef.current.focus()}>
                    <span className="sl-n">0{i+1}</span>
                    <span className="sl-plus">+</span>
                  </div>
                );
              })}
            </div>
            <div className="perf" />
          </div>

          <div className="cta">
            <button className={"cta-btn " + (ready ? "rdy" : "nrdy")} onClick={handleSubmit} disabled={!ready}>
              {ready ? "おすすめを見つける →" : `あと${remaining}本えらんでください`}
            </button>
            {ready && <p className="cta-hint">リストを保存し、感性の近い人のおすすめを表示します</p>}
            {error && <div className="err-box">{error}</div>}
          </div>
        </React.Fragment>
      )}

      {phase === "loading" && (
        <div className="load-scr">
          <div className="load-ic">🎬</div>
          <div className="load-msg">{MSGS[ldgMsg]}</div>
          <div className="load-sub">あなたのリストを分析しています</div>
        </div>
      )}

      {phase === "results" && (
        <React.Fragment>
          <div className="res-hero">
            <p className="res-ey">あなたへのおすすめ</p>
            <h2 className="res-h2">{simCnt >= 3 ? `${simCnt}人の感性が生んだ${PICK_COUNT}本` : `あなたの趣味から見つけた${PICK_COUNT}本`}</h2>
            <div className="res-badge">{simCnt >= 3 ? `👥 ${simCnt}人の近い趣向のユーザーによる推薦` : "🎞️ まだユーザーが少ないため類似作品から推薦"}</div>
          </div>

          {directorMatch && (
            <div className="dmatch">
              <div className="dmatch-tape" />
              <div className="dmatch-eyebrow">YOUR TASTE TWIN</div>
              <div className="dmatch-text">
                あなたの趣味は<span className="dmatch-name">{directorMatch.name}</span>監督と
              </div>
              <div className="dmatch-pct">{directorMatch.pct}<span className="dmatch-pct-u">% 近い</span></div>
              <div className="dmatch-note">（選んだ4本のジャンル傾向と、監督の全作品の傾向を比較して算出）</div>
            </div>
          )}

          <div className="rec-grid">
            {recs.map((m, i) => (
              <div key={m.id || i} className="rc" onClick={() => setSelectedRec(m)}>
                {m.poster && <img className="rc-poster" src={m.poster} alt="" />}
                <div className="rc-in">
                  <div className="rc-num">REC {String(i+1).padStart(2,"0")}</div>
                  <div className="rc-genre">{m.genre}</div>
                  <div className="rc-ttl">{m.title}</div>
                  <div className="rc-yr">{m.year}</div>
                  <div className="rc-dir">{m.director}</div>
                  {m.reason && <div className="rc-rsn">{m.reason}</div>}
                </div>
                <div className="rc-tap">タップで詳細</div>
              </div>
            ))}
          </div>

          <div className="mypicks">
            <div className="mypicks-lbl">あなたが選んだ{PICK_COUNT}本</div>
            <div className="chips">{picks.map(p => <span key={p.id} className="chip">{p.title}</span>)}</div>
          </div>

          <div className="acts">
            <button className="act-btn save" onClick={handleSavePicks} disabled={savingPicks}>
              {savingPicks ? "作成中..." : "📥 選んだ4本を\n画像で保存"}
            </button>
            <button className="act-btn save" onClick={handleSaveRecs} disabled={savingRecs}>
              {savingRecs ? "作成中..." : "📥 おすすめされた4本を\n画像で保存"}
            </button>
            <button className="act-btn share" onClick={handleShare}>
              𝕏 でシェア
            </button>
            <button className="act-btn reset" onClick={handleReset}>やり直す</button>
          </div>
        </React.Fragment>
      )}

      <div className="foot">Powered by TMDB</div>

      {selectedRec && (
        <div className="ov" onClick={() => setSelectedRec(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <button className="modal-close" onClick={() => setSelectedRec(null)}>×</button>
            {selectedRec.poster
              ? <img className="modal-poster" src={selectedRec.poster} alt="" />
              : <div className="modal-poster" />}
            <div className="modal-body">
              <div className="modal-genre">{selectedRec.genre}</div>
              <div className="modal-ttl">{selectedRec.title}</div>
              <div className="modal-meta">{selectedRec.year}{selectedRec.director ? ` ・ ${selectedRec.director}` : ""}</div>
              {selectedRec.reason && <div className="modal-rsn">{selectedRec.reason}</div>}
              {selectedRec.providers && selectedRec.providers.length > 0 && (
                <div className="modal-providers">配信中: {selectedRec.providers.join(" / ")}</div>
              )}
              <div className="modal-links">
                <a
                  className="modal-link eiga"
                  href={`https://eiga.com/search/${encodeURIComponent(selectedRec.title)}/`}
                  target="_blank" rel="noopener noreferrer"
                >🎬 映画.comで詳細を見る</a>
                {(() => {
                  const link = buildWatchLink(selectedRec);
                  return (
                    <a
                      className={"modal-link watch" + (link ? "" : " disabled")}
                      href={link || "#"}
                      target="_blank" rel="noopener noreferrer"
                    >📺 {link ? "配信状況を見る" : "配信情報が見つかりません"}</a>
                  );
                })()}
              </div>
              {selectedRec.watchUrl && <div className="modal-jw">配信情報: JustWatch</div>}
            </div>
          </div>
        </div>
      )}

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<!-- 上の <script type="text/plain"> は「ただの文章」としてブラウザに無視されている。
     ここで自分の手で安全に変換して実行する（古いJSXの書き方=classicを明示することで
     新しいBabelが勝手にimport文を混ぜてくるのを防ぐ） -->
<script>
  (function () {
    var src = document.getElementById("app-src").textContent;
    var out = Babel.transform(src, {
      presets: [["react", { runtime: "classic" }]]
    }).code;
    var s = document.createElement("script");
    s.textContent = out;
    document.body.appendChild(s);
  })();
</script>

     真っ暗な画面のままにせず、エラーであることが分かるようにする -->

  setTimeout(function () {
    var root = document.getElementById("root");
    if (root && root.children.length === 0) {
      root.innerHTML =
        '<div style="padding:80px 24px;text-align:center;color:#999;font-family:sans-serif;line-height:1.8;max-width:480px;margin:0 auto;">' +
        '<p style="font-size:18px;color:#d4a843;margin-bottom:14px;">読み込みに失敗しました</p>' +
        '<p style="font-size:13px;">通信環境が不安定か、サイトの一部ファイルが正しく読み込めていない可能性があります。<br><br>' +
        "ページを再読み込みしても直らない場合は、サイト管理者にこの画面のスクリーンショットを送ってください。</p>" +
        "</div>";
    }
  }, 6000);
</script>
